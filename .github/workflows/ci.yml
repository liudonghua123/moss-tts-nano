name: Cross-Platform Build & Release
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  HF_ORG: OpenMOSS-Team
  HF_REPO_TTS: MOSS-TTS-Nano-100M-ONNX
  HF_REPO_CODEC: MOSS-Audio-Tokenizer-Nano-ONNX

permissions: write-all

jobs:
  models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install Hugging Face Hub CLI
        run: |
          python -m pip install --upgrade huggingface_hub
      - name: Prepare ONNX directory
        run: |
          mkdir -p onnx
      - name: Download TTS ONNX models
        continue-on-error: true
        run: |
          hf download ${{ env.HF_ORG }}/${{ env.HF_REPO_TTS }} --local-dir onnx/MOSS-TTS-Nano-100M-ONNX
      - name: Download Codec ONNX models
        continue-on-error: true
        run: |
          hf download ${{ env.HF_ORG }}/${{ env.HF_REPO_CODEC }} --local-dir onnx/MOSS-Audio-Tokenizer-Nano-ONNX
      - name: Create tarball
        run: tar -cvzf onnx.tar.gz --exclude='.cache' onnx/
      - name: Upload ONNX models
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: onnx.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Create voices directory
        run: mkdir -p voices

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p dist/voices
          # Copy executable
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp build/Release/moss-tts-nano.exe dist/
            cp build/Release/onnxruntime*.dll dist/ 2>/dev/null || true
          else
            cp build/moss-tts-nano dist/
          fi
          # Copy voices dir (empty, just for structure)
          cp -r voices dist/ 2>/dev/null || true
          # Create tarball
          cd dist && tar -cvzf ../moss-tts-nano-${{ matrix.platform }}.tar.gz .
        shell: bash

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: moss-tts-nano-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}