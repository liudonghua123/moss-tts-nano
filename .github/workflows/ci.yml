name: Cross-Platform Build & Release
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  HF_ORG: OpenMOSS-Team
  HF_REPO_TTS: MOSS-TTS-Nano-100M-ONNX
  HF_REPO_CODEC: MOSS-Audio-Tokenizer-Nano-ONNX

jobs:
  models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download TTS ONNX models
        run: |
          mkdir -p onnx
          pip install huggingface-hub
          huggingface-cli download ${{ env.HF_ORG }}/${{ env.HF_REPO_TTS }} --local-dir onnx/MOSS-TTS-Nano-100M-ONNX
      - name: Download Codec ONNX models
        run: |
          huggingface-cli download ${{ env.HF_ORG }}/${{ env.HF_REPO_CODEC }} --local-dir onnx/MOSS-Audio-Tokenizer-Nano-ONNX
      - name: Create tarball
        run: tar -cvzf onnx.tar.gz onnx/
      - name: Upload ONNX models
        uses: softprops/action-gh-release@v1
        with:
          files: onnx.tar.gz
          tag_name: ${{ github.ref_name }}
          release_name: ONNX Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Create voices directory
        run: mkdir -p voices

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p dist/voices
          # Copy executable
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp build/Release/Release/moss-tts-nano.exe dist/
            cp build/Release/Release/onnxruntime*.dll dist/ 2>/dev/null || true
          else
            cp build/Release/moss-tts-nano dist/
          fi
          # Copy voices dir (empty, just for structure)
          cp -r voices dist/ 2>/dev/null || true
          # Create tarball
          tar -cvzf moss-tts-nano-${{ matrix.os }}.tar.gz dist/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: moss-tts-nano-*.tar.gz
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}